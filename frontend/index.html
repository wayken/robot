    <style>
      :root {
        /** -- 外观变量 -- */
        --var-page-background-color: #f6f8f9;
        --var-menu-border-color: #eeeeee;
        --var-menu-actived-color: #f4f5f5;
        --var-default-font-color: #24292e;
        --var-module-hover-color: #f4f5f5;
        --var-module-background-color: #f4f5f5;
        --var-card-background-color: #ffffff;
        --var-scrollbar-background-color: #d3d5d7;
        --var-selection-background-color: #ebf5ff;
        --var-loading-background-color: rgba(255, 255, 255, 0.8);
        /** -- 主题变量 -- */
        --var-theme-primary-1: rgba(64, 158, 255, 0.1);
        --var-theme-primary-2: rgba(64, 158, 255, 0.4);
        --var-theme-primary-3: rgba(64, 158, 255, 0.7);
        --var-theme-primary-4: #409eff;
        --var-theme-primary-5: #2563eb;
        --var-theme-primary-6: #1d4ed8;
        --var-theme-primary-7: #1e40af;
        --var-theme-primary-8: #1e3a8a;
      }
    </style>
    <style>
      .web-loading {
        display: flex;
        justify-content: center;
        align-items: center;
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        background-color: #fff;
      }
      .web-loading .loading-box {
        position: relative;
        width: 170px;
        height: 170px;
        border-radius: 50%;
        background: linear-gradient(45deg, transparent, transparent 40%, #409eff);
        animation: animate-loading 1s linear infinite;
      }
      .web-loading .loading-box::before {
        content: "";
        position: absolute;
        top: 2px;
        left: 2px;
        right: 2px;
        bottom: 2px;
        background-color: #fff;
        border-radius: 50%;
        z-index: 10;
      }
      .web-loading .loading-box::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(45deg, transparent, transparent 40%, #409eff);
        border-radius: 50%;
        filter: blur(2px);
      }
      @keyframes animate-loading {
        0% {
          transform: rotate(0deg);
          filter: hue-rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
          filter: hue-rotate(360deg);
        }
      }
      .web-loading .loading-icon {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%,-50%);
        width: 166px;
        height: 166px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 14px 0 rgb(0 0 0 / 16%);
        border-radius: 50%;
        overflow: hidden;
      }
      .web-loading svg {
        width: 120px;
        height: 120px;
      }
    </style>
  </head>
